<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Angelet Central</title>
    <meta
      name="description"
      content="Central de aplicaciones de Angelet con estetica de inventario clasico."
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=hopla-20260602b" />
  </head>
  <body>
    <main class="shell" aria-labelledby="page-title">
      <nav id="section-tabs" class="top-tabs" aria-label="Secciones">
        <button class="shoulder tab-shift" type="button" data-tab-shift="-1" aria-label="Pestaña anterior">Q</button>
        <button class="tab ghost" type="button" data-tab-id="markets">
          <span class="tab-gem"></span>
          <strong>Mercados</strong>
        </button>
        <button class="tab active" type="button" data-tab-id="apps" aria-current="page">
          <span class="tab-flask"></span>
          <strong>Apps</strong>
        </button>
        <button class="tab ghost" type="button" data-tab-id="notes">
          <span class="tab-scroll"></span>
          <strong>Tareas</strong>
        </button>
        <button class="tab ghost" type="button" data-tab-id="focus">
          <span class="tab-bottle"></span>
          <strong>Foco</strong>
        </button>
        <button class="shoulder tab-shift" type="button" data-tab-shift="1" aria-label="Pestaña siguiente">E</button>
      </nav>

      <section class="inventory tab-panel is-active" data-tab-panel="apps" aria-label="Inventario de aplicaciones">
        <div class="inventory-grid-area">
          <header class="brand-row">
            <div>
              <p class="kicker">Angelet Central</p>
              <h1 id="page-title">Apps</h1>
            </div>
          </header>

          <div id="app-grid" class="item-grid" aria-label="Aplicaciones"></div>

          <div class="lower-grid">
            <section class="bottle-section" aria-label="Botellas">
              <span class="section-label">Bottles</span>
              <div class="bottle-row">
                <a
                  class="bottle bottle-app"
                  href="https://hopla.finance/picks/home"
                  target="_blank"
                  rel="noreferrer"
                  aria-label="Abrir HOPLA Finance Picks"
                >
                  <img class="app-logo bottle-app-logo" src="assets/logos/hopla-finance.svg" alt="" loading="eager" />
                  <span class="app-name">HF</span>
                </a>
                <button class="bottle filled red" type="button" aria-label="Botella roja reservada">
                  <span></span>
                </button>
                <button class="bottle filled blue pale" type="button" aria-label="Botella clara reservada">
                  <span></span>
                </button>
                <button class="bottle empty" type="button" aria-label="Botella vacia reservada"></button>
              </div>
            </section>
            <div class="reserve-slot" aria-hidden="true"></div>
            <div class="reserve-slot" aria-hidden="true"></div>
          </div>

        </div>

        <aside class="detail-panel" aria-live="polite">
          <div class="detail-plate">
            <div id="detail-icon" class="detail-icon" aria-hidden="true"></div>
            <h2 id="detail-title"></h2>
            <p id="detail-description"></p>
          </div>

          <div class="apps-panel" aria-label="Aplicaciones disponibles">
            <span class="section-label">Apps</span>
            <strong id="app-count">06</strong>
          </div>

          <div class="wallet" aria-label="Mis rupias">
            <span class="section-label">My Rupees</span>
            <strong>999</strong>
            <div class="rupee-stack" aria-hidden="true">
              <i></i>
              <i></i>
              <i></i>
            </div>
          </div>
        </aside>
      </section>

      <section class="inventory tab-panel markets-inventory" data-tab-panel="markets" aria-label="Mercados" hidden>
        <div class="markets-grid-area">
          <span class="section-label">Mercados</span>
          <div id="markets-grid" class="markets-grid" aria-label="Cotizaciones de mercado"></div>
        </div>

        <aside class="markets-side-panel" aria-label="Estado de cotizaciones">
          <div class="market-status-card" aria-live="polite">
            <span class="section-label">Datos</span>
            <strong id="market-status">Cargando</strong>
            <p id="market-updated">Leyendo cotizaciones...</p>
          </div>

          <button id="market-refresh" class="market-refresh" type="button">
            <span aria-hidden="true">R</span>
            <strong>Actualizar</strong>
          </button>

          <div class="market-note">
            <span class="section-label">Fuente</span>
            <p>Stooq y CoinGecko. Datos demorados segun cada mercado.</p>
          </div>
        </aside>
      </section>

      <section class="inventory tab-panel notes-inventory" data-tab-panel="notes" aria-label="Tareas" hidden>
        <div class="notes-grid-area">
          <span class="section-label">Tareas</span>
          <div class="task-list" aria-label="Tareas pendientes">
            <div class="task-item" data-task-row>
              <input class="task-done" type="checkbox" aria-label="Completar tarea 1" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Tarea 1" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-task-row>
              <input class="task-done" type="checkbox" aria-label="Completar tarea 2" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Tarea 2" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-task-row>
              <input class="task-done" type="checkbox" aria-label="Completar tarea 3" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Tarea 3" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-task-row>
              <input class="task-done" type="checkbox" aria-label="Completar tarea 4" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Tarea 4" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-task-row>
              <input class="task-done" type="checkbox" aria-label="Completar tarea 5" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Tarea 5" autocomplete="off" placeholder="" />
            </div>
          </div>
        </div>

        <aside class="completed-panel" aria-label="Tareas completadas">
          <span class="section-label">Completadas</span>
          <ul id="completed-tasks" class="completed-list"></ul>
        </aside>
      </section>

      <section class="inventory tab-panel focus-inventory" data-tab-panel="focus" aria-label="Foco semanal" hidden>
        <div class="notes-grid-area">
          <span class="section-label">Foco</span>
          <div class="task-list focus-list" aria-label="Foco de la semana">
            <div class="task-item" data-focus-row>
              <input class="task-done" type="checkbox" aria-label="Marcar foco 1" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Foco 1" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-focus-row>
              <input class="task-done" type="checkbox" aria-label="Marcar foco 2" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Foco 2" autocomplete="off" placeholder="" />
            </div>
            <div class="task-item" data-focus-row>
              <input class="task-done" type="checkbox" aria-label="Marcar foco 3" />
              <span class="task-check" aria-hidden="true"></span>
              <input class="task-input" type="text" aria-label="Foco 3" autocomplete="off" placeholder="" />
            </div>
          </div>
        </div>

        <aside class="focus-panel" aria-label="Focos de la semana">
          <span class="section-label">Semana</span>
          <strong>03</strong>
        </aside>
      </section>

      <div class="footer-hints" aria-hidden="true">
        <span><b>B</b> Close</span>
        <span><b>A</b> Open</span>
      </div>
    </main>

    <template id="icon-schema">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <path class="shadow" d="M20 22h48l10 12v40H20z" />
        <path class="paper" d="M18 16h48l12 13v43H18z" />
        <path class="fold" d="M66 16v14h12z" />
        <path class="line green" d="M30 32h22" />
        <path class="line blue" d="M30 45h34" />
        <path class="node a" d="M29 58h13v13H29z" />
        <path class="node b" d="M53 58h13v13H53z" />
        <path class="join" d="M42 64h11" />
      </svg>
    </template>

    <template id="icon-mix">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <path class="handle" d="M28 66 62 26l9 8-33 40z" />
        <path class="head" d="M55 19h20l3 17-17 3z" />
        <path class="shine" d="m62 29 7-6" />
        <path class="knob red" d="M20 67h14v8H20z" />
        <path class="knob blue" d="M29 56h14v8H29z" />
        <path class="knob gold" d="M38 45h14v8H38z" />
      </svg>
    </template>

    <template id="icon-eepedia">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <path class="book-shadow" d="M24 18h42c6 0 10 4 10 10v46H32c-6 0-10-4-10-10V20z" />
        <path class="book" d="M20 14h42c6 0 10 4 10 10v46H28c-6 0-10-4-10-10V16z" />
        <path class="spine" d="M30 14v56" />
        <path class="ribbon" d="M57 14v22l-6-5-6 5V14z" />
        <path class="spark" d="M48 46h12M48 56h15M38 46h4M38 56h4" />
      </svg>
    </template>

    <template id="icon-money">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <path class="coin back" d="M57 20c13 0 22 10 22 25s-9 25-22 25-22-10-22-25 9-25 22-25z" />
        <path class="coin front" d="M39 26c13 0 22 10 22 25s-9 25-22 25-22-10-22-25 9-25 22-25z" />
        <path class="coin-line" d="M34 40h13M30 51h18M35 62h13" />
        <path class="tiny-rupee" d="M69 53 80 64 69 81 58 64z" />
      </svg>
    </template>

    <template id="icon-left2eat">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <path class="l2e-shadow" d="M21 68c0 8 11 14 27 14s27-6 27-14-11-14-27-14-27 6-27 14z" />
        <path class="l2e-plate" d="M16 60c0 12 13 20 32 20s32-8 32-20-13-20-32-20-32 8-32 20z" />
        <path class="l2e-plate-inner" d="M29 60c0 6 8 10 19 10s19-4 19-10-8-10-19-10-19 4-19 10z" />
        <path class="l2e-fork" d="M26 18v21M34 18v21M30 18v48M22 22v13c0 5 3 8 8 8s8-3 8-8V22" />
        <path class="l2e-bar protein" d="M54 18h18v8H54z" />
        <path class="l2e-bar carbs" d="M54 32h26v8H54z" />
        <path class="l2e-bar fat" d="M54 46h14v8H54z" />
      </svg>
    </template>

    <template id="icon-empty">
      <svg viewBox="0 0 96 96" role="img" aria-hidden="true">
        <circle cx="48" cy="48" r="26" />
      </svg>
    </template>

    <script src="script.js?v=hopla-20260602a"></script>
  </body>
</html>
